# [ZAPFETCH-OVERRIDE] Rewrites upstream's GHCR multi-arch build to push a
# single-arch (linux/amd64) image to Alibaba Cloud ACR — same registry used by
# zapfetch/authz and zapfetch/web-console. Our APAC production nodes are all
# amd64, so arm64 is unnecessary build cost. If that changes, restore the
# matrix from git history (commit before this override).
#
# Tag strategy: `zf-<sha8>` only. We deliberately do not publish `:latest`
# because deploy/ overlays reference images by `newTag: zf-<sha>`, and a
# rolling `:latest` tag adds a "which sha is this actually" mystery that CI
# auto-update can't help with. Every produced tag is immutable, commit-SHA
# derived, and matches one-to-one with a zapfetch/main commit.
name: Deploy Firecrawl Image to ACR

on:
  push:
    branches:
      - zapfetch/main
    paths:
      - apps/api/**
      - .github/workflows/deploy-image.yml
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-7z0wvzb0ikn88kvo.ap-southeast-1.personal.cr.aliyuncs.com
  ACR_NAMESPACE: zapfetch
  IMAGE_NAME: firecrawl

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Compute image metadata
        id: meta
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "${COMMIT_SHA}" | cut -c1-8)
          TAG="zf-${SHORT_SHA}"
          FULL="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE_NAME}:${TAG}"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL}" >> "$GITHUB_OUTPUT"
          echo "Image: ${FULL}"

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and Push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: ./apps/api
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        env:
          FULL_IMAGE: ${{ steps.meta.outputs.full_image }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          {
            echo "### Firecrawl Image (ZapFetch fork)"
            echo ""
            echo "- \`${FULL_IMAGE}\`"
            echo ""
            echo "Pin this tag in \`zapfetch/deploy\` overlays:"
            echo ""
            echo "\`\`\`yaml"
            echo "images:"
            echo "  - name: ${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE_NAME}"
            echo "    newTag: ${IMAGE_TAG}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
